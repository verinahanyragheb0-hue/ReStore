<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/forget-password.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>ReStore - Forget Password</title>
  </head>
  <body>
    <div class="logo">
      <a href="log.html"><img src="imgs/nav/logo.gif" alt="logo" /></a>
    </div>

    <h2 id="pageTitle">Forgot your password?</h2>

    <!-- Step 1: Request OTP Form -->
    <div class="forgot-card" id="step1Card">
      <form id="forgotPasswordForm" style="width: 100%">
        <p>Email</p>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          required
        />
        <button type="submit" id="submitBtn">Send reset instructions</button>
      </form>
    </div>

    <!-- Step 2: Reset Password Form (Hidden by default) -->
    <div class="forgot-card hide" id="step2Card">
      <form id="resetPasswordForm" style="width: 100%">
        <p>Verification Code (OTP)</p>
        <input
          type="text"
          id="otpCode"
          placeholder="Enter the code sent to your email"
          required
        />

        <p>New Password</p>
        <input
          type="password"
          id="newPassword"
          placeholder="Enter new password"
          required
        />

        <p>Confirm New Password</p>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm new password"
          required
        />

        <button type="submit" id="resetBtn">Reset Password</button>
      </form>
    </div>

    <a href="login.html" class="back-link">Return to the login page</a>

    <script src="forgot-password.js"></script>
  </body>
</html>
