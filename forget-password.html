<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/forget-password.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>ReStore - Forget Password</title>
  </head>
  <body>
    <div class="logo">
      <a href="log.html"><img src="imgs/nav/logo.gif" alt="logo" /></a>
    </div>
    <h2>Forgot your password?</h2>
    <div class="forgot-card">
      <p>
        Email
      </p>

      <form id="forgotPasswordForm">
        <input type="email" id="email" placeholder="Email" required />
        <button type="submit" id="submitBtn">Sent reset instructions</button>
      </form>

    </div>
    <a href="login.html" class="back-link">Return to the login page</a>

    <script src="forgot-password.js"></script>
  </body>
</html>
