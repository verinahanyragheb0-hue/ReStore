<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/info-pages.css">
    <link rel="stylesheet" href="css/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <title>ReStore - Shipping Information</title>
</head>
<body>
    <main class="info-container">
        <h1 class="page-title">Shipping Information</h1>
        <p class="page-subtitle">Fast, reliable, and eco-friendly delivery options right to your doorstep.</p>

        <div class="table-responsive">
            <table class="shipping-table">
                <thead>
                    <tr>
                        <th>Shipping Type</th>
                        <th>Delivery Time</th>
                        <th>Cost</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Standard Eco-Shipping</td>
                        <td>3 - 5 Business Days</td>
                        <td>Free</td>
                    </tr>
                    <tr>
                        <td>Express Delivery</td>
                        <td>1 - 2 Business Days</td>
                        <td>$5.00</td>
                    </tr>
                    <tr>
                        <td>Same-Day Delivery</td>
                        <td>Within 24 Hours</td>
                        <td>$10.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="js/nav.js"></script>
</body>
</html>
