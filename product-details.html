<!doctype html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Render All Elements Normally -->
    <link rel="stylesheet" href="css/normalize.css" />
    <!-- Navbar template CSS file -->
    <link rel="stylesheet" href="css/nav.css" />
    <!-- footer css style -->
    <link rel="stylesheet" href="css/footer.css" />
    <!-- main css style -->
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/product.css">
</head>
<body>
    <main class="product-details-container">
        <div class="container">
            <div class="product-view">
                <div class="product-gallery">
                    <img src="imgs/hompage/repair.png" id="main-product-img" alt="Product Image">
                </div>
                <div class="product-specs">
                    <nav class="breadcrumb">Marketplace / Phones / iPhone 13</nav>
                    <h1 id="product-name">iPhone 13 Pro - 128GB</h1>
                    <span class="condition-tag">Refurbished - Excellent</span>
                    <div class="price-tag" id="product-price">$599</div>
                    
                    <p class="description">
                        This iPhone 13 Pro is professionally inspected and tested. 
                        Battery health is guaranteed to be above 85%. Comes with 1-year ReStore warranty.
                    </p>

                    <div class="action-buttons">
                        <button class="m-btn btn">Add to Cart</button>
                        <button class="s-btn btn">Contact Seller</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/product-details.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
