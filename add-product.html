<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Your Device - ReStore</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/add-product.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main>
      <div class="container">
        <div class="form-container">
          <div class="form-header">
            <h1>Sell Your Device</h1>
            <p>Give your electronics a second life by listing them in our marketplace.</p>
          </div>
 
          <form id="addProductForm" enctype="multipart/form-data">
            <div class="form-group">
              <label for="p-name">Product Name</label>
              <input
                type="text"
                id="p-name"
                name="p-name"
                placeholder="e.g. iPhone 13 Pro - 128GB"
                required
              />
            </div>
 
            <div class="form-row">
              <div class="form-group">
                <label for="p-category">Category</label>
                <select id="p-category" name="p-category" required>
                  <option value="">Select Category</option>
                  <option value="phones">Smartphones</option>
                  <option value="laptops">Laptops</option>
                  <option value="tablets">Tablets</option>
                  <option value="accessories">Accessories</option>
                  <option value="gaming">Gaming</option>
                  <option value="wearables">Wearables</option>
                </select>
              </div>
 
              <div class="form-group">
                <label for="p-price">Price (EGP)</label>
                <input
                  type="number"
                  id="p-price"
                  name="p-price"
                  placeholder="e.g. 5000"
                  min="1"
                  required
                />
              </div>
            </div>
 
            <div class="form-group">
              <label for="p-condition">Condition</label>
              <select id="p-condition" name="p-condition" required>
                <option value="">Select Condition</option>
                <option value="excellent">Refurbished - Excellent</option>
                <option value="good">Used - Good</option>
                <option value="fair">Used - Fair</option>
              </select>
            </div>
 
            <div class="form-group">
              <label for="p-desc">Description</label>
              <textarea
                id="p-desc"
                name="p-desc"
                rows="4"
                placeholder="Describe the device's history, repairs, or any flaws..."
                required
              ></textarea>
            </div>
 
            <div class="form-group">
              <label>Product Image</label>
              <div class="image-upload-box" id="upload-box">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p>Click to upload or drag and drop</p>
                <span id="file-name-display" style="font-size:0.85rem;color:#2c9664;"></span>
                <input type="file" id="p-image" name="p-image" accept="image/*" />
              </div>
            </div>
 
            <p id="form-msg" style="text-align:center;font-size:0.9rem;margin-top:10px;"></p>
 
            <button type="submit" class="m-btn btn" style="width:100%;margin-top:20px;">
              Publish Listing
            </button>
          </form>
        </div>
      </div>
    </main>
 
    <script src="js/nav.js"></script>
    <script src="js/add-product.js"></script>
  </body>
</html>
