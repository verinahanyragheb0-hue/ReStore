<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>404 - Page Not Found | ReStore</title>
    <style>
        :root {
            --mainColor: #2C9664;
            --backgroundColor: #DEEEE5;
            --disableColor: #888;
            --mainFont: "Space Grotesk", sans-serif;
            --border-color: #e0e0e0;
        }

        body {
            font-family: var(--mainFont);
            background: linear-gradient(135deg, #f8f9f8 0%, #DEEEE5 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            padding: 40px 20px;
            text-align: center;
        }

        .error-content {
            max-width: 600px;
            animation: fadeIn 0.6s ease;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            background: linear-gradient(135deg, #2C9664, #247654);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            line-height: 1;
        }

        .error-title {
            font-size: 36px;
            color: #152720;
            margin: 20px 0 10px;
            font-weight: 600;
        }

        .error-description {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .error-icon {
            font-size: 80px;
            color: var(--mainColor);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            font-family: var(--mainFont);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2C9664, #247654);
            color: white;
            box-shadow: 0 4px 12px rgba(44, 150, 100, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(44, 150, 100, 0.4);
        }

        .btn-secondary {
            background: white;
            color: var(--mainColor);
            border: 2px solid var(--mainColor);
        }

        .btn-secondary:hover {
            background: var(--mainColor);
            color: white;
        }

        .suggestions {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
            text-align: left;
        }

        .suggestions h3 {
            font-size: 18px;
            color: #152720;
            margin-bottom: 20px;
        }

        .suggestion-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .suggestion-link {
            padding: 12px 16px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-decoration: none;
            color: var(--mainColor);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: block;
        }

        .suggestion-link:hover {
            background: var(--mainColor);
            color: white;
            border-color: var(--mainColor);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 28px;
            }

            .error-icon {
                font-size: 60px;
            }

            .error-actions {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                width: 100%;
            }
        }

        @media (max-width: 576px) {
            .error-container {
                min-height: 60vh;
                padding: 30px 16px;
            }

            .error-code {
                font-size: 60px;
            }

            .error-title {
                font-size: 22px;
                margin: 16px 0 8px;
            }

            .error-description {
                font-size: 14px;
            }

            .error-icon {
                font-size: 50px;
                margin-bottom: 16px;
            }

            .suggestion-links {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation will be inserted here -->

    <main class="error-container">
        <div class="error-content">
            <div class="error-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>

            <h1 class="error-code">404</h1>

            <h2 class="error-title">Page Not Found</h2>

            <p class="error-description">
                Oops! The page you're looking for doesn't exist or has been moved. Don't worry, we'll help you get back on track.
            </p>

            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">
                    <i class="fa-solid fa-home"></i> Go Home
                </a>
                <button class="btn btn-secondary" onclick="window.history.back()">
                    <i class="fa-solid fa-arrow-left"></i> Go Back
                </button>
            </div>

            <div class="suggestions">
                <h3>Here are some helpful links:</h3>
                <div class="suggestion-links">
                    <a href="index.html" class="suggestion-link">
                        <i class="fa-solid fa-home"></i> Home
                    </a>
                    <a href="market.html" class="suggestion-link">
                        <i class="fa-solid fa-shop"></i> Shop
                    </a>
                    <a href="cart.html" class="suggestion-link">
                        <i class="fa-solid fa-cart-shopping"></i> Cart
                    </a>
                    <a href="help.html" class="suggestion-link">
                        <i class="fa-solid fa-circle-question"></i> Help
                    </a>
                    <a href="repair.html" class="suggestion-link">
                        <i class="fa-solid fa-wrench"></i> Repairs
                    </a>
                    <a href="waste.html" class="suggestion-link">
                        <i class="fa-solid fa-recycle"></i> Recycling
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer will be inserted here -->

    <script>
        // Load components
        async function loadComponent(filePath, position) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error(`Failed to load ${filePath}`);
                const data = await response.text();
                document.body.insertAdjacentHTML(position, data);
            } catch (error) {
                console.error(`Error loading component:`, error);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadComponent("nav.html", "afterbegin");
            loadComponent("footer.html", "beforeend");
        });
    </script>
</body>
</html>
